<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>¡Llave Encontrada! · Oralands</title>
<style>
  :root{
    --ink:#e8e0d2; --muted:#9a8f7d; --dim:#6f6656; --accent:#c9a24a; --accent-ink:#1a1509;
    --line:#3a3227; --panel:#1e1a14; --success:#7fae5a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0806;font-family:var(--sans);color:var(--ink);min-height:100vh;overflow:hidden}

  .ritual{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:18px;text-align:center;padding:32px;
          background:radial-gradient(120% 90% at 50% 42%,#2a2210 0%,#0a0806 72%)}

  /* halo dorado que crece al aparecer la llave */
  .ritual::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(42% 34% at 50% 42%,rgba(201,162,74,.22),transparent 70%);
    opacity:0}
  .ritual.play::before{animation:halo 2.4s ease-out forwards}
  @keyframes halo{0%{opacity:0;transform:scale(.6)}35%{opacity:1;transform:scale(1)}100%{opacity:.7;transform:scale(1.05)}}

  /* rayos de luz girando muy lento tras la llave */
  .rays{position:absolute;top:calc(42% - 90px);left:50%;width:180px;height:180px;transform:translateX(-50%);
        opacity:0;pointer-events:none;
        background:conic-gradient(from 0deg,transparent 0 12deg,rgba(201,162,74,.14) 12deg 16deg,transparent 16deg 30deg,
          rgba(201,162,74,.10) 30deg 33deg,transparent 33deg 60deg,rgba(201,162,74,.14) 60deg 64deg,transparent 64deg 90deg,
          rgba(201,162,74,.10) 90deg 93deg,transparent 93deg 120deg,rgba(201,162,74,.14) 120deg 124deg,transparent 124deg 180deg,
          rgba(201,162,74,.10) 180deg 183deg,transparent 183deg 240deg,rgba(201,162,74,.14) 240deg 244deg,transparent 244deg 360deg);
        border-radius:50%;filter:blur(1px)}
  .ritual.play .rays{animation:raysIn .8s ease-out .2s forwards, spin 22s linear infinite}
  @keyframes raysIn{to{opacity:1}}
  @keyframes spin{to{transform:translateX(-50%) rotate(360deg)}}

  .stage{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px}

  /* la llave */
  .key{width:72px;height:72px;opacity:0}
  .key path,.key circle,.key rect{stroke:var(--accent);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ritual.play .key{animation:keyIn 1s cubic-bezier(.2,.9,.3,1.2) forwards, gleam 2.4s ease-in-out .8s}
  @keyframes keyIn{0%{opacity:0;transform:translateY(20px) rotate(-25deg) scale(.6)}
    60%{opacity:1;transform:translateY(0) rotate(6deg) scale(1.1)}100%{opacity:1;transform:rotate(0) scale(1)}}
  @keyframes gleam{0%,100%{filter:drop-shadow(0 0 6px rgba(201,162,74,.5))}
    50%{filter:drop-shadow(0 0 18px rgba(201,162,74,.95))}}

  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);opacity:0}
  .ritual.play .kicker{animation:rise .8s ease-out .5s forwards}
  .headline{font-size:26px;font-weight:700;letter-spacing:.01em;color:var(--ink);
            text-shadow:0 0 28px rgba(201,162,74,.4);opacity:0}
  .ritual.play .headline{animation:rise .8s ease-out .7s forwards}
  .body{font-size:14px;color:var(--muted);max-width:24ch;line-height:1.55;opacity:0}
  .ritual.play .body{animation:rise .9s ease-out 1s forwards}
  .body b{color:var(--accent);font-weight:700}
  .go{margin-top:8px;background:var(--accent);color:var(--accent-ink);border:none;border-radius:10px;
      padding:13px 30px;font-size:15px;font-weight:700;cursor:pointer;opacity:0}
  .ritual.play .go{animation:rise .8s ease-out 1.35s forwards}
  .go:active{transform:scale(.97)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* destellos (chispas doradas) al aparecer la llave */
  .spark{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--accent);
         top:42%;left:50%;opacity:0;pointer-events:none;box-shadow:0 0 6px rgba(201,162,74,.9)}

  .replay{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:5;
          background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:999px;
          padding:9px 20px;font-size:12px;font-family:var(--mono);cursor:pointer}
  .replay:hover{border-color:var(--accent);color:var(--ink)}
</style>
</head>
<body>
  <div class="ritual" id="ritual">
    <div class="rays"></div>
    <div class="stage">
      <svg class="key" viewBox="0 0 64 64" id="key">
        <circle cx="22" cy="22" r="11" />
        <circle cx="22" cy="22" r="3.5" />
        <path d="M30 30 L50 50" />
        <path d="M44 44 L50 38 M50 50 L56 44" />
      </svg>
      <div class="kicker">Hallazgo raro</div>
      <div class="headline">¡Llave encontrada!</div>
      <div class="body">Una llave clavada en una puerta olvidada.<br>Ahora puedes comenzar la <b>Cripta olvidada</b> desde el <b>piso 5</b>.</div>
      <button class="go" id="go">Guardar la llave</button>
    </div>
  </div>
  <button class="replay" id="replay">↻ Ver de nuevo</button>

<script>
  const ritual = document.getElementById("ritual");

  function sparks(){
    for(let i=0;i<14;i++){
      const s = document.createElement("div");
      s.className = "spark"; ritual.appendChild(s);
      const ang = Math.random()*Math.PI*2, dist = 40 + Math.random()*90;
      const dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist - 20;
      s.animate(
        [{opacity:0,transform:"translate(0,0) scale(1)"},
         {opacity:1,offset:.2},
         {opacity:0,transform:`translate(${dx}px,${dy}px) scale(0)`}],
        {duration:800+Math.random()*500, delay:700+Math.random()*200, easing:"cubic-bezier(.2,.7,.3,1)"}
      );
      setTimeout(()=>s.remove(), 1800);
    }
  }

  function run(){
    ritual.classList.remove("play");
    void ritual.offsetWidth;
    ritual.classList.add("play");
    sparks();
  }
  document.getElementById("go").addEventListener("click", () => { document.getElementById("go").textContent = "→ (vuelves al juego)"; });
  document.getElementById("replay").addEventListener("click", run);
  run();
</script>
</body>
</html>
