name: Build stats

on:
  schedule:
    - cron: "0 */8 * * *"   # cada 8 horas
  workflow_dispatch:          # también manual desde la pestaña Actions

permissions:
  contents: write             # para commitear public/stats.json

concurrency:
  group: build-stats
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install firebase-admin
        run: npm install firebase-admin@^12 --no-save

      - name: Build stats.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/build-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "stats-bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add public/stats.json
          if git diff --staged --quiet; then
            echo "Sin cambios en stats.json"
          else
            git commit -m "chore: actualiza estadísticas [skip ci]"
            git push
          fi
