<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Entrada a Mazmorra (genérica) · Oralands</title>
<style>
  :root{
    --ink:#e8e0d2; --muted:#9a8f7d; --dim:#6f6656; --accent:#c9a24a;
    --line:#3a3227; --panel:#1e1a14;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0806;font-family:var(--sans);color:var(--ink);min-height:100vh;
       display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}

  .fakegame{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
            color:var(--dim);font-family:var(--mono);font-size:13px;letter-spacing:.1em}

  /* overlay de transición — UNA sola plantilla para TODAS las mazmorras */
  .trans{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
         gap:16px;text-align:center;padding:32px;opacity:0;pointer-events:none;z-index:10;
         background:radial-gradient(120% 90% at 50% 42%,#1b1610,#07060a 74%)}
  .trans.show{opacity:1;pointer-events:auto}

  /* glifo genérico: un portal/umbral en SVG, igual para toda mazmorra */
  .portal{width:64px;height:64px;opacity:0}
  .portal path,.portal line{stroke:var(--accent);stroke-width:2;fill:none;stroke-linecap:round}
  .trans.play .portal{animation:pulse 2s ease-out forwards}
  @keyframes pulse{0%{opacity:0;transform:translateY(10px) scale(.9)}
    22%{opacity:1;transform:translateY(0) scale(1)}78%{opacity:1}100%{opacity:0;transform:scale(1.04)}}

  .title{font-size:22px;font-weight:700;letter-spacing:.02em;max-width:16ch;line-height:1.25;
         color:var(--ink);text-shadow:0 0 28px rgba(201,162,74,.3);opacity:0}
  .desc{font-size:13.5px;color:var(--muted);max-width:26ch;line-height:1.5;font-style:italic;opacity:0}
  .floor{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);opacity:0}
  .trans.play .title{animation:fade 2s ease-out .12s forwards}
  .trans.play .desc{animation:fade 2s ease-out .28s forwards}
  .trans.play .floor{animation:fade 2s ease-out .4s forwards}
  @keyframes fade{0%{opacity:0;transform:translateY(8px)}22%{opacity:1;transform:translateY(0)}78%{opacity:1}100%{opacity:0}}

  .mote{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--accent);opacity:0;bottom:-6px}

  /* controles demo */
  .panel{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(10,8,6,.94);
         border-top:1px solid var(--line);padding:14px 16px calc(14px + env(safe-area-inset-bottom))}
  .panel .lbl{color:var(--dim);font-size:10px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;text-align:center}
  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
  .row button{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:9px;
              padding:9px 14px;font-size:12.5px;cursor:pointer}
  .row button:hover{border-color:var(--accent);color:var(--ink)}
  .custom{display:flex;gap:8px;max-width:520px;margin:0 auto;flex-wrap:wrap;justify-content:center}
  .custom input{background:#14110d;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--sans)}
  .custom input.n{flex:1;min-width:160px}.custom input.d{flex:2;min-width:200px}
  .custom button{background:var(--accent);color:#1a1509;border:none;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer}
  .hint{position:fixed;top:22px;left:0;right:0;text-align:center;color:var(--dim);font-size:11px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;padding:0 20px}
</style>
</head>
<body>
  <div class="hint">Una sola plantilla · lee nombre + descripción de cualquier mazmorra</div>
  <div class="fakegame" id="fakegame">· sala 1 ·</div>

  <div class="trans" id="trans">
    <svg class="portal" viewBox="0 0 64 64" id="portal">
      <path d="M14 58 L14 26 A18 18 0 0 1 50 26 L50 58" />
      <line x1="8" y1="58" x2="56" y2="58" />
      <path d="M32 20 L32 40 M24 32 L32 40 L40 32" />
    </svg>
    <div class="title" id="title"></div>
    <div class="desc" id="desc"></div>
    <div class="floor" id="floor"></div>
  </div>

  <div class="panel">
    <div class="lbl">Mazmorras existentes (datos reales del juego)</div>
    <div class="row" id="presets"></div>
    <div class="lbl">Mazmorra inventada (simula una del administrador)</div>
    <div class="custom">
      <input class="n" id="cn" placeholder="Nombre (ej. Foso de ceniza)" value="Santuario de sal" />
      <input class="d" id="cd" placeholder="Descripción ambiental" value="Cavernas blancas donde el aire quema la garganta." />
      <button id="cgo">Entrar ▸</button>
    </div>
  </div>

<script>
  // Estos son los datos REALES de las mazmorras (name/desc del juego). La plantilla no sabe cuáles son:
  // solo recibe name + desc y los pinta. Una mazmorra nueva del admin llega igual.
  const PRESETS = [
    { name:"Cripta olvidada",      desc:"Pasillos de piedra tomados por los no-muertos." },
    { name:"Madriguera infestada", desc:"Túneles de tierra donde pululan las alimañas." },
    { name:"Guarida salvaje",      desc:"Cuevas húmedas donde acechan las bestias." },
    { name:"Ruinas profundas",     desc:"Ruinas antiguas donde se mezclan todas las amenazas." },
  ];

  const trans = document.getElementById("trans");
  const titleEl = document.getElementById("title");
  const descEl = document.getElementById("desc");
  const floorEl = document.getElementById("floor");
  const fake = document.getElementById("fakegame");
  let moteTimer = null;

  function motes(){
    clearInterval(moteTimer);
    moteTimer = setInterval(() => {
      if(!trans.classList.contains("play")) return;
      const m = document.createElement("div");
      m.className = "mote"; m.style.left = Math.random()*100 + "%";
      const dur = 1.5 + Math.random()*0.9;
      m.animate([{opacity:0,transform:"translateY(0)"},{opacity:.6,offset:.3},{opacity:0,transform:"translateY(-42vh)"}],
        {duration:dur*1000, easing:"linear"});
      trans.appendChild(m); setTimeout(()=>m.remove(), dur*1000+50);
    }, 95);
  }

  // La MISMA función para cualquier mazmorra — solo recibe datos.
  function enter(name, desc, startFloor){
    titleEl.textContent = name;
    descEl.textContent = desc;
    floorEl.textContent = startFloor ? ("→ directo al piso " + startFloor) : "";
    fake.textContent = "· " + name + " · sala " + (startFloor || 1) + " ·";

    trans.classList.remove("play");
    void trans.offsetWidth;
    trans.classList.add("show","play");
    motes();
    const done = () => { trans.classList.remove("show","play"); clearInterval(moteTimer); trans.removeEventListener("click", done); };
    trans.addEventListener("click", done);   // saltable
    setTimeout(done, 2000);
  }

  const presetsRow = document.getElementById("presets");
  PRESETS.forEach((d, i) => {
    const b = document.createElement("button");
    b.textContent = d.name;
    b.addEventListener("click", () => enter(d.name, d.desc, i === 3 ? 10 : 0)); // ruinas: demo con llave
    presetsRow.appendChild(b);
  });
  document.getElementById("cgo").addEventListener("click", () => {
    enter(document.getElementById("cn").value || "Mazmorra sin nombre",
          document.getElementById("cd").value || "Un lugar oscuro y sin descripción.", 0);
  });
</script>
</body>
</html>
